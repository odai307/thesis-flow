<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - ThesisFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#c0c1ff",
                        "tertiary-fixed-dim": "#ffb59d",
                        "primary-fixed": "#e1e0ff",
                        "tertiary-container": "#932c00",
                        "error-container": "#ffdad6",
                        "primary": "#1713b8",
                        "surface": "#fbf8ff",
                        "tertiary": "#6c1e00",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbd0",
                        "secondary-fixed-dim": "#bdc7de",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1b1b23",
                        "error": "#ba1a1a",
                        "on-primary-container": "#bbbdff",
                        "secondary-container": "#d6e0f8",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e9e6f3",
                        "background": "#fbf8ff",
                        "on-primary-fixed-variant": "#2a2bc4",
                        "on-surface-variant": "#454555",
                        "on-primary-fixed": "#04006d",
                        "on-surface": "#1b1b23",
                        "primary-fixed-dim": "#c0c1ff",
                        "outline-variant": "#c6c5d7",
                        "on-secondary-container": "#596377",
                        "outline": "#767586",
                        "secondary": "#555f73",
                        "surface-container-highest": "#e4e1ed",
                        "surface-variant": "#e4e1ed",
                        "surface-bright": "#fbf8ff",
                        "on-error-container": "#93000a",
                        "primary-container": "#3538cd",
                        "surface-dim": "#dbd8e5",
                        "on-tertiary-fixed": "#390c00",
                        "inverse-on-surface": "#f2effc",
                        "on-tertiary-container": "#ffaf95",
                        "on-primary": "#ffffff",
                        "surface-tint": "#4549dc",
                        "on-secondary-fixed": "#111c2d",
                        "surface-container": "#efecf9",
                        "inverse-surface": "#303039",
                        "on-tertiary-fixed-variant": "#832600",
                        "on-secondary-fixed-variant": "#3d475a",
                        "secondary-fixed": "#d9e3fb",
                        "surface-container-low": "#f5f2fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "sidebar-collapsed": "64px",
                        "sidebar-width": "280px",
                        "gutter": "24px",
                        "section-gap": "40px",
                        "margin-mobile": "16px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "section-header": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-base": ["Inter"],
                        "label-md": ["Inter"],
                        "label-xs": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "section-header": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "label-xs": ["12px", { "lineHeight": "18px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg-mobile": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-gutter font-body-base antialiased">
<!-- Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_6px_-1px_rgb(0_0_0_/_0.1),_0_2px_4px_-2px_rgb(0_0_0_/_0.1)] border border-outline-variant p-8 md:p-10">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-8">
<div class="h-12 w-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 text-on-primary shadow-sm border border-[#EAECF0]">
<span class="material-symbols-outlined text-[28px]" data-icon="description">description</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-1 text-center">Create your account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Join ThesisFlow as a Student Researcher</p>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-gap" method="POST">
<!-- Name Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap">
<!-- First Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="first_name">First Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 font-body-base text-body-base text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200" id="first_name" name="first_name" required="" type="text"/>
</div>
<!-- Last Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="last_name">Last Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 font-body-base text-body-base text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200" id="last_name" name="last_name" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="email">University Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-3 py-2 font-body-base text-body-base text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-3 py-2 font-body-base text-body-base text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200" id="password" name="password" required="" type="password"/>
</div>
</div>
<!-- Department Dropdown -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="department">Academic Department</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="school">school</span>
</div>
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-10 py-2 font-body-base text-body-base text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-fixed focus:outline-none transition-all duration-200 appearance-none" id="department" name="department" required="">
<option disabled="" selected="" value="">Select your department...</option>
<option value="cs">Computer Science</option>
<option value="math">Mathematics</option>
<option value="physics">Physics</option>
<option value="history">History</option>
<option value="biology">Biology</option>
<option value="engineering">Engineering</option>
<option value="literature">Literature</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Terms (Hidden/Implicit but good practice) -->
<div class="pt-2">
<p class="font-body-sm text-[13px] leading-tight text-on-surface-variant">
                    By clicking "Create Account", you agree to the <a class="text-primary hover:text-primary-container font-medium underline-offset-2 hover:underline transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-container font-medium underline-offset-2 hover:underline transition-colors" href="#">Privacy Policy</a>.
                </p>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-[#3538CD] hover:bg-[#2a2bc4] text-white font-label-md text-label-md py-3 rounded-lg shadow-sm transition-all duration-200 flex justify-center items-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center border-t border-outline-variant pt-6">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary hover:text-primary-container font-medium transition-colors hover:underline underline-offset-4 ml-1" href="/login">
                    Log in
                </a>
</p>
</div>
</main>
</body></html>
