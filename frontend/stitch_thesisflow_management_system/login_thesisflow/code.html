<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ThesisFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#c0c1ff",
                        "tertiary-fixed-dim": "#ffb59d",
                        "primary-fixed": "#e1e0ff",
                        "tertiary-container": "#932c00",
                        "error-container": "#ffdad6",
                        "primary": "#1713b8",
                        "surface": "#fbf8ff",
                        "tertiary": "#6c1e00",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbd0",
                        "secondary-fixed-dim": "#bdc7de",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1b1b23",
                        "error": "#ba1a1a",
                        "on-primary-container": "#bbbdff",
                        "secondary-container": "#d6e0f8",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e9e6f3",
                        "background": "#fbf8ff",
                        "on-primary-fixed-variant": "#2a2bc4",
                        "on-surface-variant": "#454555",
                        "on-primary-fixed": "#04006d",
                        "on-surface": "#1b1b23",
                        "primary-fixed-dim": "#c0c1ff",
                        "outline-variant": "#c6c5d7",
                        "on-secondary-container": "#596377",
                        "outline": "#767586",
                        "secondary": "#555f73",
                        "surface-container-highest": "#e4e1ed",
                        "surface-variant": "#e4e1ed",
                        "surface-bright": "#fbf8ff",
                        "on-error-container": "#93000a",
                        "primary-container": "#3538cd",
                        "surface-dim": "#dbd8e5",
                        "on-tertiary-fixed": "#390c00",
                        "inverse-on-surface": "#f2effc",
                        "on-tertiary-container": "#ffaf95",
                        "on-primary": "#ffffff",
                        "surface-tint": "#4549dc",
                        "on-secondary-fixed": "#111c2d",
                        "surface-container": "#efecf9",
                        "inverse-surface": "#303039",
                        "on-tertiary-fixed-variant": "#832600",
                        "on-secondary-fixed-variant": "#3d475a",
                        "secondary-fixed": "#d9e3fb",
                        "surface-container-low": "#f5f2fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "sidebar-collapsed": "64px",
                        "sidebar-width": "280px",
                        "gutter": "24px",
                        "section-gap": "40px",
                        "margin-mobile": "16px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "section-header": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-base": ["Inter"],
                        "label-md": ["Inter"],
                        "label-xs": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "section-header": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "label-xs": ["12px", { "lineHeight": "18px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg-mobile": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-base text-body-base text-on-surface antialiased p-margin-mobile md:p-gutter">
<!-- Login Container -->
<div class="w-full max-w-md">
<!-- Logo Header -->
<div class="text-center mb-8">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">
                    menu_book
                </span>
<h1 class="font-headline-md text-headline-md text-primary">ThesisFlow</h1>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your academic portal</p>
</div>
<!-- Card Container -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-sm p-6 sm:p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email address</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full rounded border border-outline-variant px-3 py-2 bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_0_3px_rgba(53,56,205,0.1)] transition-all sm:text-sm" id="email" name="email" placeholder="you@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
<div class="mt-1">
<input autocomplete="current-password" class="block w-full rounded border border-outline-variant px-3 py-2 bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_0_3px_rgba(53,56,205,0.1)] transition-all sm:text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded bg-primary-container font-label-md text-label-md text-on-primary hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-opacity shadow-sm" type="submit">
                        Sign in
                    </button>
</div>
</form>
</div>
<!-- Footer Link -->
<p class="mt-6 text-center font-body-sm text-body-sm text-on-surface-variant">
            Don't have an account? 
            <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">
                Register
            </a>
</p>
</div>
</body></html>
