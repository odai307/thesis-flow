<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ThesisFlow - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1b1b23",
                        "error": "#ba1a1a",
                        "on-primary-container": "#bbbdff",
                        "secondary-container": "#d6e0f8",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e9e6f3",
                        "background": "#fbf8ff",
                        "on-primary-fixed-variant": "#2a2bc4",
                        "on-surface-variant": "#454555",
                        "on-primary-fixed": "#04006d",
                        "on-surface": "#1b1b23",
                        "primary-fixed-dim": "#c0c1ff",
                        "outline-variant": "#c6c5d7",
                        "on-secondary-container": "#596377",
                        "outline": "#767586",
                        "secondary": "#555f73",
                        "surface-container-highest": "#e4e1ed",
                        "surface-variant": "#e4e1ed",

                        "inverse-on-surface": "#f2effc",
                        "on-tertiary-container": "#ffaf95",
                        "on-primary": "#ffffff",
                        "surface-tint": "#4549dc",
                        "on-secondary-fixed": "#111c2d",
                        "surface-container": "#efecf9",
                        "inverse-surface": "#303039",
                        "on-tertiary-fixed-variant": "#832600",
                        "on-secondary-fixed-variant": "#3d475a",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "sidebar-collapsed": "64px",
                        "sidebar-width": "280px",
                        "gutter": "24px",
                        "section-gap": "40px",
                        "margin-mobile": "16px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "section-header": ["Inter"],
                        "body-sm": ["Inter"],

                    "fontSize": {

<style>
        body {
            background-color: #F9FAFB;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-base text-on-surface antialiased">
<!-- Suppressed TopAppBar and SideNavBar for focused transactional flow -->
<main class="w-full max-w-md px-margin-mobile md:px-0">
<!-- Brand Header -->
<div class="text-center mb-section-gap">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ThesisFlow</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Academic Portal</p>
</div>
<!-- Reset Password Card -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-[0_4px_6px_-1px_rgb(0,0,0,0.1),0_2px_4px_-2px_rgb(0,0,0,0.1)] p-8 hover:border-outline transition-colors duration-200">
<div class="mb-8 text-center">
<span class="material-symbols-outlined text-[48px] text-primary mb-4" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
<h2 class="font-section-header text-section-header text-on-surface">Reset your password</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Please enter your new password below.</p>
</div>
<form class="space-y-stack-gap">
<!-- New Password Field -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface" for="new-password">New Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base text-body-base placeholder-outline focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(53,56,205,0.2)] transition-all" id="new-password" name="new-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-on-surface" for="confirm-password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">lock_clock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base text-body-base placeholder-outline focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(53,56,205,0.2)] transition-all" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
<p class="font-label-xs text-label-xs text-on-surface-variant mt-1">Must be at least 8 characters long.</p>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded shadow-sm font-label-md text-label-md text-on-primary bg-[#3538CD] hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                        Update password
                    </button>
</div>
</form>
<div class="mt-6 text-center">
<a class="font-body-sm text-body-sm text-[#3538CD] hover:text-primary transition-colors inline-flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
</main>
</body></html>
